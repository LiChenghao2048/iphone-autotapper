# iPhone action script
# Run with: python3 control.py start script.yaml
#
# Action types: tap, drag, circle
# count: 0 = run forever

actions:
  - type: tap
    x: 701
    y: 402
    interval: [0.75, 1.25]
    count: 0

  - type: drag
    x1: [265, 268]
    y1: [265, 268]
    x2: [250, 283]
    y2: [250, 283]
    duration: [1000, 2000]
    interval: [0.5, 0.75]
    count: 0

  - type: circle
    center_x: [265, 268]
    center_y: [265, 268]
    radius: [20, 30]
    duration: [500, 600]
    burst: [10, 15]
    interval: [5, 10]
    count: 0
