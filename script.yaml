# iPhone action script
# Run with: python3 control.py start script.yaml
#
# Action types: tap, drag, circle
# count: 0 = run forever

actions:
  - type: tap
    x: 701
    y: 402
    interval: 1.0   # seconds between taps
    count: 0        # 0 = forever

